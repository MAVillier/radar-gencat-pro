name: Hourly sync snapshot

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Debug repo contents
        run: |
          echo "PWD:"
          pwd
          echo ""
          echo "ROOT:"
          ls -la
          echo ""
          echo "SCRIPTS:"
          ls -la scripts || true
          echo ""
          echo "DATA:"
          ls -la data || true
          echo ""
          echo "NODE:"
          node -v
          npm -v

      - name: Check sync script exists
        run: |
          test -f scripts/sync.mjs
          echo "sync.mjs trobat correctament"

      - name: Generate snapshot
        run: node scripts/sync.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: refresh procurement snapshot"
          git push
